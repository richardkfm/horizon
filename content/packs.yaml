# horizon content-pack catalog.
#
# Content packs are LARGE optional offline resources (an offline Wikipedia, a
# medical reference, offline maps) that are downloaded while the internet is
# available and then used fully offline. They are NOT required: horizon's
# journeys, guides, md skills and assistant all work without any packs.
#
# This catalog is shipped read-only with horizon and copied into the data
# directory on first run, so the list of available packs is known offline.
# Operators may edit their copy under <content_dir>/packs.yaml to add their own.
#
# Each pack:
#   id           stable identifier used by `horizon-content` and the admin UI
#   title        human-readable name
#   description  one line on what the pack is and why you might want it
#   category     reference | medical | maps (free-form grouping label)
#   format       file format hint (zim, osm.pbf, ...)
#   url          download URL (used only while online during setup)
#   size_bytes   approximate download size, for display and disk planning
#   sha256       optional integrity checksum; verified after download if set
#
# Kiwix (https://download.kiwix.org) publishes ZIM filenames with an embedded
# build date (e.g. wikipedia_en_top_mini_2026-06.zim) and removes older dates
# as new ones are published, so a pinned filename here *will* eventually 404
# again. Undated aliases (e.g. wikipedia_en_top_mini.zim) do not exist. If a
# Kiwix pack starts failing, browse https://download.kiwix.org/zim/<dir>/ for
# the current dated filename and update the url below.

packs:
  - id: wikipedia-en-mini
    title: Wikipedia (English, top articles)
    description: >-
      A compact offline snapshot of English Wikipedia (top ~50k articles, no
      images). Good first pack for weak hardware and small disks.
    category: reference
    format: zim
    url: https://download.kiwix.org/zim/wikipedia/wikipedia_en_top_mini_2026-06.zim
    size_bytes: 331421691
    sha256: ""

  - id: medical-wikem
    title: Medical reference (WikEM)
    description: >-
      Offline emergency-medicine reference. Point-of-care guidance for first aid
      and acute care when no clinician or network is available.
    category: medical
    format: zim
    url: https://download.kiwix.org/zim/other/wikem_en_all_maxi_2026-04.zim
    size_bytes: 48676248
    sha256: ""

  # Maps: raw per-continent OpenStreetMap extracts from Geofabrik
  # (https://download.geofabrik.de), a long-standing free, unauthenticated
  # mirror updated daily. These are *not* pre-rendered tiles — horizon has no
  # built-in map viewer yet — so each is raw .osm.pbf source data an operator
  # can render locally (e.g. with Planetiler) into a basemap of their choice.
  # A pre-tiled offline basemap (e.g. as .mbtiles) would need an account/API
  # key with every provider we found (MapTiler, etc.), which conflicts with
  # horizon staying usable with no external accounts.
  - id: maps-africa
    title: Africa map data (OpenStreetMap extract)
    description: >-
      Raw OpenStreetMap data for Africa, for building a local offline basemap.
    category: maps
    format: osm.pbf
    url: https://download.geofabrik.de/africa-latest.osm.pbf
    size_bytes: 7874551430
    sha256: ""

  - id: maps-asia
    title: Asia map data (OpenStreetMap extract)
