# Tracks — curated, *ordered* sequences of guides for a multi-step goal.
#
# A track (modelled as a "journey" for API/contract stability, shown to
# visitors as a "step-by-step plan") lists its guides in the order you'd work
# through them. There are no prerequisites: the order *is* the path.
#
# Tracks are an optional, curated layer over the guides — only goals with a
# genuine "do this, then this" progression get one. Most guides are browsed and
# read directly from the library (/guides); a guide does not need a track to be
# useful. Each track here threads together guides that already exist under
# content/guides/.
#
# Each track: id, title, description, category, difficulty (1-5),
# estimated_time, guides (ordered guide ids). Grow the set over time.

journeys:
  - id: safe-drinking-water
    title: Provide safe drinking water for a group
    description: >
      Go from no reliable source to safe, stored drinking water for a small
      group: harvest rain or find and protect a well or spring, judge what
      you've got, choose the right treatment, then build and run a slow sand
      filter.
    category: water
    difficulty: 3
    estimated_time: "A few days"
    guides:
      - water-rainwater-harvesting
      - water-wells-and-springs
      - water-field-testing
      - water-choosing-treatment
      - water-slow-sand-filter

  - id: grow-and-store-food
    title: Grow and store your own food
    description: >
      Plan a first growing season and make it last: rebuild worn-out ground,
      pick crops that suit your site, establish a vegetable garden, grow
      calorie-dense staples, troubleshoot problems as they come up, and save
      seed so you can grow again next year.
    category: food
    difficulty: 3
    estimated_time: "A growing season"
    guides:
      - food-soil-and-land-restoration
      - food-choosing-crops
      - food-vegetable-garden
      - food-diagnose-plant-problems
      - food-staple-crops-500m2
      - food-seed-saving

  - id: off-grid-power
    title: Set up off-grid power
    description: >
      Build a small renewable power system step by step: size it from your real
      energy use, wire up solar, store it in a battery bank, and add wind for
      the darker months.
    category: energy
    difficulty: 4
    estimated_time: "Several days"
    guides:
      - energy-sizing-solar-battery
      - energy-low-tech-solar
      - energy-battery-storage
      - energy-wind-power

  - id: build-a-shelter
    title: Plan and build a shelter
    description: >
      Decide what to build, then build it to last: choose the right shelter for
      your climate and needs, keep it warm and dry with good insulation, and
      frame a simple timber cabin for longer-term living.
    category: shelter
    difficulty: 4
    estimated_time: "Weeks"
    guides:
      - shelter-choosing
      - shelter-insulation-basics
      - shelter-timber-cabin

  - id: cook-from-scratch
    title: Cook good food from scratch
    description: >
      Build everyday cooking skills with little fuel and few tools: simple
      one-pot meals, balanced plant proteins, bread by hand, and preserving a
      harvest so nothing goes to waste.
    category: cooking
    difficulty: 2
    estimated_time: "Ongoing practice"
    guides:
      - cooking-one-pot-meals
      - cooking-plant-protein
      - cooking-bread-baking
      - cooking-preserving

  - id: wilderness-survival-basics
    title: Core wilderness survival skills
    description: >
      The hands-on basics for being out in the field: choose and set up a safe
      camp, make fire, find and carry water, manage waste and hygiene, find
      your way without a compass, tie essential knots, find food by foraging,
      and signal for rescue if it comes to that.
    category: survival
    difficulty: 3
    estimated_time: "Ongoing practice"
    guides:
      - survival-campsite-setup
      - survival-fire
      - survival-find-water
      - survival-sanitation-hygiene
      - survival-navigation
      - survival-knots
      - survival-foraging
      - survival-signaling-for-rescue

  - id: respond-to-mass-casualty-emergency
    title: Respond when several people are hurt at once
    description: >
      Go from single-patient first aid to coping when more than one person is
      hurt at the same time: learn the calm priority order, extend it into a
      fast sorting method for multiple casualties, treat the most urgent
      injuries, and support people through the shock afterward.
    category: health
    difficulty: 3
    estimated_time: "A few hours to learn, then ongoing practice"
    guides:
      - health-first-aid-basics
      - health-mass-casualty-triage
      - health-bleeding-control
      - health-fractures-and-sprains
      - health-psychological-first-aid

  - id: share-culture-together
    title: Bring people together with culture
    description: >
      Easy, no-gear ways to lift morale and build trust in a group: lead group
      songs and simple dances, run games anyone can join, make basic
      instruments, and keep knowledge alive through storytelling.
    category: culture
    difficulty: 1
    estimated_time: "An afternoon to start"
    guides:
      - culture-group-songs
      - culture-circle-dances
      - culture-no-gear-games
      - culture-simple-instruments
      - culture-storytelling

  - id: craft-and-maintain-tools
    title: Make and maintain your own tools
    description: >
      Build basic self-sufficiency in craft: twist plant fibre into strong
      cordage, spin and weave fibre into simple cloth, make simple cutting
      and digging tools from wood, stone, and salvage, keep those tools
      sharp and safe, and mend clothes and textiles to make them last.
    category: crafts
    difficulty: 2
    estimated_time: "A few afternoons"
    guides:
      - crafts-cordage
      - crafts-fiber-and-textiles
      - crafts-make-tools
      - crafts-tool-repair
      - crafts-mending-textiles

  - id: practical-building-maths
    title: Practical maths for planning and building
    description: >
      The everyday numbers self-reliance needs: measure area and volume, turn a
      plan into material quantities, judge safe weights and loads, and size an
      energy system — in that order of difficulty.
    category: calculations
    difficulty: 3
    estimated_time: "A few hours"
    guides:
      - calc-area-volume
      - calc-materials-quantities
      - calc-structural-loads
      - calc-energy-sizing

  - id: cooperative-governance-from-scratch
    title: Set up cooperative governance from scratch
    description: >
      Build a group's ability to act together and stay fair over time: learn to
      make one good decision together, put lasting accountable structure around
      it, resolve disputes as they come up, share resources without resentment,
      and extend that same trust to neighbouring groups.
    category: cooperation
    difficulty: 2
    estimated_time: "A few afternoons to set up, then ongoing"
    guides:
      - cooperation-group-decisions
      - cooperation-democratic-governance
      - cooperation-resolving-conflict
      - cooperation-sharing-resources
      - cooperation-external-relations

  - id: prepare-for-a-long-blackout
    title: Prepare for and get through a long blackout
    description: >
      Losing power is the common thread behind many emergencies: prepare for and
      live through a long blackout, keep safe from extreme heat and extreme cold
      once the grid is down, avoid the fire risk that comes with makeshift
      heating and lighting, and get by without a car if you don't have one to
      fall back on.
    category: emergencies
    difficulty: 3
    estimated_time: "A few hours to prepare, then ongoing"
    guides:
      - emergency-blackout
      - emergency-extreme-heat
      - emergency-extreme-cold
      - emergency-extinguish-fire
      - emergency-no-car-household

  - id: set-up-local-tech-infrastructure
    title: Set up local tech infrastructure
    description: >
      Build a neighbourhood's own information infrastructure from what's
      already lying around: learn to repair small electronics and computers,
      give an old machine a real job as a local server, build the network it
      lives on, go deeper into a resilient mesh, and add two-way radio as a
      voice channel alongside it.
    category: technology
    difficulty: 3
    estimated_time: "A few weekends"
    guides:
      - technology-electronics-repair
      - technology-computer-maintenance
      - technology-repurpose-old-pc
      - technology-local-network
      - technology-mesh-network
      - technology-two-way-radio

  - id: sustainable-mobility-basics
    title: Get around and haul loads without a car
    description: >
      Build human-powered mobility from the ground up: keep a bicycle
      reliable, learn to move heavy loads like water and firewood without a
      car, then build a cargo trailer that turns your bike into a serious
      load-hauling tool.
    category: mobility
    difficulty: 2
    estimated_time: "A weekend to build, then ongoing"
    guides:
      - mobility-bike-maintenance
      - mobility-heavy-loads
      - mobility-cargo-trailer
