# horizon — offline-first deployment.
#
# The default `docker compose up -d` starts ONLY horizon: a small image, no
# model runtime, fully offline. The "Ask a question" assistant falls back to
# local guide search until you point it at a model.
#
# The local LLM is OPTIONAL and you have two ways to enable it:
#
#   A) Use your own llama.cpp / OpenAI-compatible server (recommended if you
#      already run one). In config.yaml set:
#        llm:
#          provider: openai-compatible
#          endpoint: http://<your-host>:8081/v1
#      No extra container is pulled.
#
#   B) Run the bundled Ollama container (pulls a ~3GB image). Opt in with the
#      `ai` profile, then pull a model:
#        docker compose --profile ai up -d
#        docker compose exec ollama ollama pull llama3.2:3b
#        docker compose exec ollama ollama pull nomic-embed-text
#
# Then open http://<host>:8080

services:
  horizon:
    build: .
    image: horizon:0.7.0
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - horizon-data:/data
      # config.yaml is tracked in the repo with safe defaults (no model runtime
      # required; the admin area auto-generates its own token if you don't set
      # one), so this mount always has a source — edit config.yaml directly and
      # `docker compose up -d --force-recreate` to apply changes (e.g. setting
      # admin.token to your own value).
      - ./config.yaml:/app/config.yaml:ro
    # No depends_on: horizon boots and serves without any model runtime, and
    # connects to the configured llm.endpoint lazily over HTTP when present.

  # OPTIONAL local model runtime. Only started with `--profile ai`, so the
  # default install stays small and offline-first. Skip this entirely if you
  # point llm.endpoint at your own llama.cpp / OpenAI-compatible server.
  ollama:
    image: ollama/ollama:latest
    profiles: ["ai"]
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
    # Port is exposed only to the horizon service by default. Uncomment to
    # access the Ollama API directly on the host:
    # ports:
    #   - "11434:11434"

volumes:
  horizon-data:
  ollama-data:
