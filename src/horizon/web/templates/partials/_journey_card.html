<li class="journey-card{% if journey.is_entry %} is-entry{% endif %}">
  <a href="/journeys/{{ journey.id }}">
    <span class="badge-row">
      <span class="category-badge">{{ journey.category }}</span>
      {% if journey.is_entry %}<span class="start-badge">Start here</span>{% endif %}
    </span>
    <h2>{{ journey.title }}</h2>
    {% if journey.description %}<p>{{ journey.description }}</p>{% endif %}
    <p class="journey-meta">
      <span title="Difficulty 1–5">Difficulty {{ journey.difficulty }}/5</span>
      {% if journey.estimated_time %}<span>· {{ journey.estimated_time }}</span>{% endif %}
    </p>
  </a>
</li>
