{% extends "base.html" %}
{% block title %}{{ guide.title }} — horizon{% endblock %}
{% block content %}
<p class="breadcrumb no-print"><a href="/journeys">← Journeys</a></p>

<div class="guide-actions no-print">
  <span class="category-badge">{{ guide.category }}</span>
  <button type="button" class="btn" onclick="window.print()">Print</button>
  <a class="btn" href="/guides/{{ guide.id }}.pdf">Download PDF</a>
</div>

<article class="guide">
  {{ body_html | safe }}
</article>
{% endblock %}
